<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #6366f1; color: white; border: none; border-radius: 8px; padding: 12px; cursor: pointer; font-weight: 600; }
        p { color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Register</h1>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p style="color:red; font-size:0.9rem; margin-bottom:15px;">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="user" placeholder="Choose Username" required>
            <input type="password" name="pass" placeholder="Choose Password" required>
            <button type="submit">Create Account</button>
        </form>
        <p><a href="/login" style="color: #6366f1;">Back to Login</a></p>
    </div>
</body>
</html>

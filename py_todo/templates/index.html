<!DOCTYPE html>
<html>
<head>
    <title>My Tasks</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; justify-content: center; padding-top: 50px; color: #1e293b; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 380px; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; }
        button { background: #6366f1; color: white; border: none; border-radius: 8px; padding: 10px 15px; cursor: pointer; font-weight: 600; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .del { color: #ef4444; text-decoration: none; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2 style="margin:0;">{{ name }}'s Tasks</h2>
            <a href="{{ url_for('logout') }}" style="color: #64748b; text-decoration: none; font-size: 0.8rem; border: 1px solid #e2e8f0; padding: 4px 8px; border-radius: 6px;">Logout</a>
        </div>
        <form action="/add" method="POST" class="input-row">
            <input type="text" name="task" placeholder="Add a new task..." required>
            <button type="submit">+</button>
        </form>
        <ul>
            {% for task in tasks %}
            <li>
                <span>{{ task['content'] }}</span>
                <a href="{{ url_for('delete', id=task['id']) }}" class="del">×</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
